<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umpire Availability Manager</title>

  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#1d4ed8;
      --brand2:#0f172a;
      --good:#15803d;
      --warn:#b45309;
      --bad:#b91c1c;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    /* 🔒 MOBILE LOCK FIX */
    html, body{
      overflow-x: hidden;
      max-width: 100%;
    }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:linear-gradient(135deg, var(--brand2), var(--brand));
      color:#fff;
      padding:28px 20px;
      box-shadow:var(--shadow);
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      width:100%;
      overflow-x:hidden; /* 🔒 prevent overflow */
    }

    h1,h2,h3,p{margin:0}

    .hero{
      display:flex;
      justify-content:space-between;
      gap:18px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .hero p{
      max-width:720px;
      opacity:.92;
      margin-top:8px;
      line-height:1.5;
    }

    .pill{
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.18);
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      white-space:nowrap;
    }

    main{padding:22px 20px 48px}

    .grid{
      display:grid;
      grid-template-columns: 300px 1fr;
      gap:22px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .sidebar .card + .card{margin-top:16px}

    label{display:block;font-size:13px;font-weight:600;margin:14px 0 7px}

    input, select, textarea{
      width:100%;
      padding:12px 13px;
      border:1px solid #d1d5db;
      border-radius:12px;
      font:inherit;
      background:#fff;
    }

    textarea{min-height:90px;resize:vertical}

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.6}

    .btn-primary{background:var(--brand);color:#fff}
    .btn-secondary{background:#eef2ff;color:var(--brand)}
    .btn-danger{background:#fee2e2;color:var(--bad)}
    .btn-ghost{background:#f3f4f6;color:var(--text)}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }

    .stat{
      padding:16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    .stat b{
      display:block;
      font-size:26px;
      margin-top:4px;
    }

    .table-wrap{
      overflow-x:auto;
      width:100%;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:600px; /* 👈 keeps table inside scroll only */
    }

    th,td{
      padding:10px 8px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:14px;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width: 560px){
      .stats{
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:10px;
      }

      .stat{
        padding:12px;
      }

      .stat b{
        font-size:22px;
      }

      header{padding:24px 16px}
      main{padding:18px 16px 34px}
    }
  </style>
</head>

<body>

<header>
  <div class="wrap hero">
    <div>
      <h1>Umpire Availability Manager</h1>
      <p>Fixtures, availability, and assignments.</p>
    </div>
    <div class="pill">Mobile optimised</div>
  </div>
</header>

<main>
  <div class="wrap grid">

    <aside class="sidebar">
      <div class="card">
        <h3>Menu</h3>
        <p class="muted">Sidebar content here</p>
      </div>
    </aside>

    <section>
      <div class="topbar">
        <h2>Dashboard</h2>
      </div>

      <div class="stats">
        <div class="stat"><span>Fixtures</span><b>12</b></div>
        <div class="stat"><span>Open</span><b>4</b></div>
        <div class="stat"><span>Umpires</span><b>8</b></div>
        <div class="stat"><span>Assignments</span><b>10</b></div>
      </div>

      <div class="card" style="margin-top:18px">
        <h3>Availability Overview</h3>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fixture</th>
                <th>Available</th>
                <th>Maybe</th>
                <th>Unavailable</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Match 1</td>
                <td>3</td>
                <td>1</td>
                <td>0</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

    </section>

  </div>
</main>

</body>
</html>
