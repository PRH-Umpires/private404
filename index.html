<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://xhuijmuqzlysufaegfgb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhodWlqbXVxemx5c3VmYWVnZmdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODE3NTMsImV4cCI6MjA4OTI1Nzc1M30.6OQXMwLdE0OfEmstDmqC0JZvR71zOzs3yx6MryXD-xE";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let state = {
    umpires: [],
    fixtures: [],
    availability: []
  };

  const els = {
    viewMode: document.getElementById('viewMode'),
    umpireSelect: document.getElementById('umpireSelect'),
    umpireLoginArea: document.getElementById('umpireLoginArea'),
    adminPanel: document.getElementById('adminPanel'),
    addUmpireCard: document.getElementById('addUmpireCard'),
    addFixtureCard: document.getElementById('addFixtureCard'),
    umpireName: document.getElementById('umpireName'),
    umpireLevel: document.getElementById('umpireLevel'),
    umpireArea: document.getElementById('umpireArea'),
    addUmpireBtn: document.getElementById('saveUmpireSupabaseBtn'),
    fixtureDate: document.getElementById('fixtureDate'),
    fixtureTime: document.getElementById('fixtureTime'),
    fixtureTitle: document.getElementById('fixtureTitle'),
    fixtureVenue: document.getElementById('fixtureVenue'),
    fixtureLeague: document.getElementById('fixtureLeague'),
    fixtureNeed: document.getElementById('fixtureNeed'),
    fixtureStatus: document.getElementById('fixtureStatus'),
    fixtureNotes: document.getElementById('fixtureNotes'),
    addFixtureBtn: document.getElementById('addFixtureBtn'),
    statsRow: document.getElementById('statsRow'),
    fixtureList: document.getElementById('fixtureList'),
    overviewBody: document.getElementById('overviewBody'),
    clearBtn: document.getElementById('clearBtn'),
    fixtureFilter: document.getElementById('fixtureFilter'),
    dashboardText: document.getElementById('dashboardText'),
    seedDemoBtn: document.getElementById('seedDemoBtn'),
    exportBtn: document.getElementById('exportBtn'),
    importFile: document.getElementById('importFile')
  };

  function currentView() {
    return els.viewMode.value;
  }

  function currentUmpireId() {
    return els.umpireSelect.value || '';
  }

  function getUmpire(id) {
    return state.umpires.find(u => String(u.id) === String(id));
  }

  function getAvailability(fixture, umpireId) {
    return state.availability.find(
      r => String(r.fixtureId) === String(fixture.id) && String(r.umpireId) === String(umpireId)
    ) || null;
  }

  function getCounts(fixture) {
    const rows = state.availability.filter(r => String(r.fixtureId) === String(fixture.id));
    return {
      available: rows.filter(r => r.status === 'Available').length,
      maybe: rows.filter(r => r.status === 'Maybe').length,
      unavailable: rows.filter(r => r.status === 'Unavailable').length,
      assigned: 0
    };
  }

  function formatDate(date, time) {
    const dt = new Date(date + 'T' + (time || '00:00'));
    return dt.toLocaleString([], {
      weekday: 'short',
      day: 'numeric',
      month: 'short',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  async function syncStateFromSupabase() {
    const [umpireResult, fixtureResult, availabilityResult] = await Promise.all([
      supabaseClient.from("Umpires").select("*").order("name", { ascending: true }),
      supabaseClient.from("Fixtures").select("*").order("date", { ascending: true }),
      supabaseClient.from("availability").select("*")
    ]);

    if (umpireResult.error) {
      console.error("Error loading umpires:", umpireResult.error);
    }
    if (fixtureResult.error) {
      console.error("Error loading fixtures:", fixtureResult.error);
    }
    if (availabilityResult.error) {
      console.error("Error loading availability:", availabilityResult.error);
    }

    const umpireRows = umpireResult.data || [];
    const fixtureRows = fixtureResult.data || [];
    const availabilityRows = availabilityResult.data || [];

    state.umpires = umpireRows.map(row => ({
      id: String(row.id),
      name: row.name || "",
      level: row.level || "",
      area: row.area || ""
    }));

    state.fixtures = fixtureRows.map(row => ({
      id: String(row.id),
      date: row.date || "",
      time: row.time || "",
      title: row.away_team ? `${row.home_team} vs ${row.away_team}` : (row.home_team || row.title || "Fixture"),
      venue: row.venue || "",
      league: row.league || "",
      umpiresNeeded: Number(row.umpires_needed ?? row.umpiresNeeded ?? 2),
      status: row.status || "Open",
      notes: row.notes || ""
    }));

    state.availability = availabilityRows.map(row => ({
      id: String(row.id),
      umpireId: String(row.umpire_id),
      fixtureId: String(row.fixture_id),
      status: row.status || ""
    }));

    render();
  }

  async function addUmpire() {
    const name = els.umpireName.value.trim();
    const level = els.umpireLevel.value.trim();
    const area = els.umpireArea.value.trim();

    if (!name) {
      alert('Please enter an umpire name.');
      return;
    }

    const payload = {
      name,
      level,
      email: ""
    };

    const { error } = await supabaseClient.from("Umpires").insert([payload]);

    if (error) {
      console.error("Error saving umpire:", error);
      alert("Error saving umpire");
      return;
    }

    els.umpireName.value = '';
    els.umpireLevel.value = '';
    els.umpireArea.value = '';

    await syncStateFromSupabase();
    alert("Umpire saved");
  }

  async function addFixture() {
    const date = els.fixtureDate.value;
    const time = els.fixtureTime.value;
    const title = els.fixtureTitle.value.trim();
    const venue = els.fixtureVenue.value.trim();
    const umpiresNeeded = Number(els.fixtureNeed.value || 2);

    if (!date || !time || !title) {
      alert('Please add date, time, and fixture title.');
      return;
    }

    const payload = {
      date,
      time,
      home_team: title,
      venue,
      umpires_needed: umpiresNeeded
    };

    const { error } = await supabaseClient.from("Fixtures").insert([payload]);

    if (error) {
      console.error("Error saving fixture:", error);
      alert("Error saving fixture");
      return;
    }

    els.fixtureDate.value = '';
    els.fixtureTime.value = '';
    els.fixtureTitle.value = '';
    els.fixtureVenue.value = '';
    els.fixtureLeague.value = '';
    els.fixtureNotes.value = '';
    els.fixtureNeed.value = 2;
    els.fixtureStatus.value = 'Open';

    await syncStateFromSupabase();
    alert("Fixture saved");
  }

  async function setAvailability(fixtureId, umpireId, status) {
    if (!fixtureId || !umpireId) return;

    const existing = state.availability.find(
      r => String(r.fixtureId) === String(fixtureId) && String(r.umpireId) === String(umpireId)
    );

    let error = null;

    if (existing) {
      const result = await supabaseClient
        .from("availability")
        .update({ status })
        .eq("id", Number(existing.id));
      error = result.error;
    } else {
      const result = await supabaseClient
        .from("availability")
        .insert([{
          umpire_id: Number(umpireId),
          fixture_id: Number(fixtureId),
          status
        }]);
      error = result.error;
    }

    if (error) {
      console.error("Error saving availability:", error);
      alert("Error saving availability");
      return;
    }

    await syncStateFromSupabase();
  }

  async function deleteFixture(fixtureId) {
    if (!confirm('Delete this fixture?')) return;

    await supabaseClient.from("availability").delete().eq("fixture_id", Number(fixtureId));
    const { error } = await supabaseClient.from("Fixtures").delete().eq("id", Number(fixtureId));

    if (error) {
      console.error("Error deleting fixture:", error);
      alert("Error deleting fixture");
      return;
    }

    await syncStateFromSupabase();
  }

  function renderStats() {
    const totalFixtures = state.fixtures.length;
    const openFixtures = state.fixtures.filter(f => f.status === 'Open').length;
    const totalUmpires = state.umpires.length;
    const assignedSlots = 0;

    els.statsRow.innerHTML = [
      ['Fixtures', totalFixtures],
      ['Open', openFixtures],
      ['Umpires', totalUmpires],
      ['Assignments', assignedSlots]
    ].map(([label, value]) =>
      `<div class="stat"><span class="muted">${label}</span><b>${value}</b></div>`
    ).join('');
  }

  function renderUmpireSelect() {
    const current = currentUmpireId();
    els.umpireSelect.innerHTML = state.umpires.length
      ? state.umpires.map(u => `<option value="${u.id}">${u.name}${u.level ? ' · ' + u.level : ''}</option>`).join('')
      : '<option value="">No umpires yet</option>';

    if (state.umpires.some(u => String(u.id) === String(current))) {
      els.umpireSelect.value = current;
    }
  }

  function filteredFixtures() {
    let fixtures = [...state.fixtures].sort(
      (a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)
    );

    const filter = els.fixtureFilter.value;
    const umpireId = currentUmpireId();

    if (filter === 'open') fixtures = fixtures.filter(f => f.status === 'Open');
    if (filter === 'assigned') fixtures = fixtures.filter(f => f.status === 'Assigned');
    if (filter === 'mine' && umpireId) {
      fixtures = fixtures.filter(f =>
        state.availability.some(r => String(r.fixtureId) === String(f.id) && String(r.umpireId) === String(umpireId))
      );
    }

    return fixtures;
  }

  function renderFixtures() {
    const view = currentView();
    const umpireId = currentUmpireId();
    const fixtures = filteredFixtures();

    if (!fixtures.length) {
      els.fixtureList.innerHTML = `<div class="notice">No fixtures to show yet.</div>`;
      return;
    }

    els.fixtureList.innerHTML = fixtures.map(fixture => {
      const counts = getCounts(fixture);
      const myResponse = getAvailability(fixture, umpireId);

      const candidateRows = view === 'admin'
        ? state.umpires.map(u => {
            const resp = getAvailability(fixture, u.id);
            const style =
              resp?.status === 'Available' ? 'available' :
              resp?.status === 'Maybe' ? 'maybe' :
              resp?.status === 'Unavailable' ? 'unavailable' : '';

            return `<tr>
              <td>${u.name}<div class="small muted">${[u.level, u.area].filter(Boolean).join(' · ')}</div></td>
              <td>${resp?.status ? `<span class="tag ${style}">${resp.status}</span>` : '<span class="muted small">No response</span>'}</td>
              <td><span class="muted small">—</span></td>
            </tr>`;
          }).join('')
        : '';

      return `
        <div class="fixture">
          <div class="fixture-head">
            <div>
              <div class="fixture-title">${fixture.title}</div>
              <div class="muted" style="margin-top:6px">${formatDate(fixture.date, fixture.time)}</div>
            </div>
            <span class="tag">${fixture.status}</span>
          </div>

          <div class="meta">
            ${fixture.venue ? `<span class="tag">Venue: ${fixture.venue}</span>` : ''}
            ${fixture.league ? `<span class="tag">League: ${fixture.league}</span>` : ''}
            <span class="tag">Need: ${fixture.umpiresNeeded}</span>
          </div>

          ${fixture.notes ? `<div class="notice" style="margin-top:14px">${fixture.notes}</div>` : ''}

          ${view === 'umpire' ? `
            <div class="availability-row">
              <button class="btn availability-btn ${myResponse?.status === 'Available' ? 'available' : 'btn-ghost'}" onclick="setAvailability('${fixture.id}','${umpireId}','Available')">Available</button>
              <button class="btn availability-btn ${myResponse?.status === 'Maybe' ? 'maybe' : 'btn-ghost'}" onclick="setAvailability('${fixture.id}','${umpireId}','Maybe')">Maybe</button>
              <button class="btn availability-btn ${myResponse?.status === 'Unavailable' ? 'unavailable' : 'btn-ghost'}" onclick="setAvailability('${fixture.id}','${umpireId}','Unavailable')">Unavailable</button>
            </div>
          ` : `
            <div class="table-wrap" style="margin-top:14px">
              <table>
                <thead>
                  <tr>
                    <th>Umpire</th>
                    <th>Availability</th>
                    <th>Assignment</th>
                  </tr>
                </thead>
                <tbody>${candidateRows}</tbody>
              </table>
            </div>
          `}

          <div class="fixture-footer">
            <div>
              <div class="counts">
                <span class="tag">Available: ${counts.available}</span>
                <span class="tag">Maybe: ${counts.maybe}</span>
                <span class="tag">Unavailable: ${counts.unavailable}</span>
                <span class="tag">Assigned: ${counts.assigned}/${fixture.umpiresNeeded}</span>
              </div>
            </div>
            ${view === 'admin' ? `<button class="btn btn-danger" onclick="deleteFixture('${fixture.id}')">Delete fixture</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderOverview() {
    const rows = [...state.fixtures].sort(
      (a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)
    );

    els.overviewBody.innerHTML = rows.length
      ? rows.map(f => {
          const counts = getCounts(f);
          return `<tr>
            <td><strong>${f.title}</strong><div class="small muted">${formatDate(f.date, f.time)}</div></td>
            <td>${counts.available}</td>
            <td>${counts.maybe}</td>
            <td>${counts.unavailable}</td>
            <td>—</td>
          </tr>`;
        }).join('')
      : '<tr><td colspan="5" class="muted">No fixtures yet.</td></tr>';
  }

  function renderAdminCards() {
    const admin = currentView() === 'admin';
    els.adminPanel.classList.toggle('hidden', !admin);
    els.addUmpireCard.classList.toggle('hidden', !admin);
    els.addFixtureCard.classList.toggle('hidden', !admin);
    els.umpireLoginArea.classList.toggle('hidden', admin);
    els.dashboardText.textContent = admin
      ? 'Add fixtures, manage availability, and assign umpires.'
      : 'Choose your name and update your availability for each fixture.';
  }

  function render() {
    renderAdminCards();
    renderUmpireSelect();
    renderStats();
    renderFixtures();
    renderOverview();
  }

  window.setAvailability = setAvailability;
  window.deleteFixture = deleteFixture;

  els.addUmpireBtn.addEventListener('click', addUmpire);
  els.addFixtureBtn.addEventListener('click', addFixture);
  els.viewMode.addEventListener('change', render);
  els.umpireSelect.addEventListener('change', render);
  els.fixtureFilter.addEventListener('change', render);

  els.seedDemoBtn.addEventListener('click', () => {
    alert('Demo data is disabled in database mode.');
  });

  els.exportBtn.addEventListener('click', () => {
    alert('Export is disabled in database mode.');
  });

  els.importFile.addEventListener('change', () => {
    alert('Import is disabled in database mode.');
    els.importFile.value = '';
  });

  els.clearBtn.addEventListener('click', async () => {
    await syncStateFromSupabase();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement === els.umpireName) {
      els.addUmpireBtn.click();
    }
  });

  syncStateFromSupabase();
</script>
</body>
</html>
