<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mistress | Mistress Deville</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #d1d1d1;
            --accent-color: #7a0000;
            --glass-bg: rgba(25, 25, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            letter-spacing: 0.02em;
        }

        /* --- Header & Nav (Consistent with Slaves) --- */
        .site-header {
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .header-content {
            width: 90%;
            max-width: 1000px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.8rem;
            color: var(--accent-color);
            text-decoration: none;
        }

        nav {
            background: #000;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-link {
            color: #888;
            text-decoration: none;
            padding: 20px 25px;
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }

        /* --- Main Content --- */
        .main-content {
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
        }

        .container {
            max-width: 750px; /* Slimmed down for better focus */
            margin: 0 auto;
            background: var(--glass-bg);
            padding: 40px 60px;
            border-radius: 2px;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .hero-img-container {
            max-width: 450px;
            margin: 0 auto 30px auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-img { width: 100%; display: block; filter: brightness(90%); }

        .contact-intro {
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.8rem;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .required-notice {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
        }

        /* --- Form Refinements --- */
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group { flex: 1; margin-bottom: 20px; }

        label {
            display: block;
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            background: rgba(255,255,255,0.06);
            outline: none;
        }

        .sub-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        textarea { height: 140px; }

        .submit-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .submit-btn:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <a href="index.html" class="header-logo">Mistress Deville</a>
            <span class="mail-link">Private Inquiries</span>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="about.html" class="nav-link">Profile</a>
            <a href="sessions.html" class="nav-link">Sessions</a>
            <a href="gifts.html" class="nav-link">Tributes</a>
            <a href="contact.html" class="nav-link" style="color:#fff">Contact</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="hero-img-container">
                <img src="contact.png" alt="Mistress Deville" class="hero-img">
            </div>

            <div class="contact-intro">
                You can use the form below to contact me... <br>
                <span style="text-decoration: underline;">All information given is confidential.</span>
            </div>

            <p class="required-notice">* Indicates required field</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label>Name *</label>
                    <div class="form-row">
                        <div style="flex:1">
                            <input type="text" name="first_name" required>
                            <span class="sub-label">First</span>
                        </div>
                        <div style="flex:1">
                            <input type="text" name="last_name" required>
                            <span class="sub-label">Last</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="phone" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Your Needs *</label>
                    <textarea name="needs" required placeholder="Describe your desires and scenarios..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Inquiry</button>
            </form>
        </div>
    </div>

</body>
</html>
