<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mistress | Mistress Deville</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #d1d1d1;
            --accent-color: #7a0000;
            --glass-bg: rgba(25, 25, 25, 0.9);
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Header & Nav (Condensed) --- */
        .site-header {
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            padding: 15px 0;
        }

        .header-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.2rem;
            color: var(--accent-color);
            text-decoration: none;
        }

        nav {
            background: #000;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .nav-link {
            color: #888;
            text-decoration: none;
            padding: 15px 20px;
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* --- Compact Main Content --- */
        .main-content {
            padding: 30px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
            min-height: calc(100vh - 120px);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--glass-bg);
            padding: 30px 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .hero-img-container {
            max-width: 280px; /* Much smaller to save vertical space */
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-img { width: 100%; display: block; filter: brightness(90%); }

        .contact-intro {
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .required-notice {
            color: #666;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- Grid Layout for Form --- */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        textarea { height: 80px; resize: none; } /* Shortened height */

        .sub-label {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            margin-top: 2px;
            display: block;
        }

        .submit-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #900000; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .form-row { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <a href="index.html" class="header-logo">Mistress Deville</a>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="about.html" class="nav-link">Profile</a>
            <a href="sessions.html" class="nav-link">Sessions</a>
            <a href="gifts.html" class="nav-link">Tributes</a>
            <a href="contact.html" class="nav-link" style="color:#fff">Contact</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="hero-img-container">
                <img src="contact.png" alt="Mistress Deville" class="hero-img">
            </div>

            <div class="contact-intro">
                All information given is confidential.
            </div>

            <p class="required-notice">* Required</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label>Name *</label>
                    <div class="form-row" style="margin-bottom: 0;">
                        <div>
                            <input type="text" name="first_name" required>
                            <span class="sub-label">First</span>
                        </div>
                        <div>
                            <input type="text" name="last_name" required>
                            <span class="sub-label">Last</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div>
                        <label>Phone *</label>
                        <input type="tel" name="phone" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Your Needs *</label>
                    <textarea name="needs" required placeholder="Detail your desires..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>

</body>
</html>
