<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mistress | Mistress Deville</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #d1d1d1;
            --accent-color: #7a0000;
            --glass-bg: rgba(25, 25, 25, 0.9);
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        /* --- Header & Nav (Condensed) --- */
        .site-header {
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        .header-content {
            width: min(92%, 1000px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.2rem;
            color: var(--accent-color);
            text-decoration: none;
            text-align: center;
        }

        nav {
            background: #000;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            width: min(100%, 1100px);
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .nav-link,
        .dropbtn {
            color: #888;
            text-decoration: none;
            padding: 15px 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            background: none;
            border: none;
            cursor: pointer;
            min-height: 48px;
            white-space: nowrap;
            transition: color 0.3s ease, background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-link:hover,
        .dropbtn:hover {
            color: #fff;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            top: 100%;
            background-color: #111;
            min-width: 280px;
            max-width: min(92vw, 360px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid var(--border-color);
            text-align: left;
            z-index: 1001;
        }

        .dropdown-content a {
            color: #888;
            padding: 14px 18px;
            text-decoration: none;
            display: block;
            font-size: 0.7rem;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            line-height: 1.45;
            white-space: normal;
            word-break: break-word;
        }

        .dropdown-content a:hover {
            background-color: #1a1a1a;
            color: #fff;
        }

        .dropdown.open .dropdown-content {
            display: block;
        }

        /* --- Compact Main Content --- */
        .main-content {
            padding: 30px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
            min-height: calc(100vh - 120px);
            overflow-x: clip;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--glass-bg);
            padding: 30px 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .hero-img-container {
            max-width: 280px;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-img {
            width: 100%;
            display: block;
            filter: brightness(90%);
        }

        .contact-intro {
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .required-notice {
            color: #666;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- Grid Layout for Form --- */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
            resize: none;
        }

        .sub-label {
            font-size: 0.65rem;
            color: #555;
            text-transform: uppercase;
            margin-top: 2px;
            display: block;
        }

        .submit-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #900000;
        }

        @media (max-width: 760px) {
            .nav-container {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .nav-link,
            .dropbtn,
            .dropdown {
                width: 100%;
            }

            .dropdown-content {
                left: 50%;
                transform: translateX(-50%);
                min-width: min(92vw, 340px);
            }
        }

        @media (max-width: 600px) {
            .site-header {
                padding: 14px 12px;
            }

            .header-logo {
                font-size: 1.95rem;
            }

            .main-content {
                padding: 20px 12px;
            }

            .container {
                padding: 20px 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .nav-container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .nav-link,
            .dropbtn {
                padding: 14px 10px;
                font-size: 0.64rem;
                letter-spacing: 1.5px;
                white-space: normal;
                text-align: center;
                line-height: 1.35;
            }

            .dropdown {
                position: relative;
            }

            .dropdown-content {
                position: static;
                transform: none;
                min-width: 100%;
                max-width: 100%;
                box-shadow: none;
                border-left: none;
                border-right: none;
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <a href="index.html" class="header-logo">Mistress Deville</a>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="about.html" class="nav-link">Profile</a>
            <div class="dropdown">
                <a href="sessions.html" class="nav-link dropbtn" aria-expanded="false">Sessions ▼</a>
                <div class="dropdown-content">
                    <a href="cp-judicial.html">CP, Judicial Punishments and OTK Spanking</a>
                    <a href="therapy-spanking.html">Therapy Spanking</a>
                    <a href="slaves.html">Roleplay and Slaves</a>
                </div>
            </div>
            <a href="gifts.html" class="nav-link">Tributes</a>
            <a href="contact.html" class="nav-link" style="color:#fff">Contact</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="hero-img-container">
                <img src="contact.png" alt="Mistress Deville" class="hero-img">
            </div>

            <div class="contact-intro">
                All information given is confidential.
            </div>

            <p class="required-notice">* Required</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label>Name *</label>
                    <div class="form-row" style="margin-bottom: 0;">
                        <div>
                            <input type="text" name="first_name" required>
                            <span class="sub-label">First</span>
                        </div>
                        <div>
                            <input type="text" name="last_name" required>
                            <span class="sub-label">Last</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div>
                        <label>Phone *</label>
                        <input type="tel" name="phone" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Your Needs *</label>
                    <textarea name="needs" required placeholder="Detail your desires..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>

    <script>
        (function () {
            const dropdowns = document.querySelectorAll('.dropdown');

            dropdowns.forEach((dropdown) => {
                const trigger = dropdown.querySelector('.dropbtn');

                if (!trigger) return;

                trigger.addEventListener('click', function (e) {
                    const isMobile = window.matchMedia('(max-width: 760px)').matches;

                    if (isMobile) {
                        e.preventDefault();
                        const isOpen = dropdown.classList.contains('open');

                        dropdowns.forEach((item) => {
                            item.classList.remove('open');
                            const btn = item.querySelector('.dropbtn');
                            if (btn) btn.setAttribute('aria-expanded', 'false');
                        });

                        if (!isOpen) {
                            dropdown.classList.add('open');
                            trigger.setAttribute('aria-expanded', 'true');
                        }
                    }
                });
            });

            document.addEventListener('click', function (e) {
                if (!e.target.closest('.dropdown')) {
                    dropdowns.forEach((dropdown) => {
                        dropdown.classList.remove('open');
                        const btn = dropdown.querySelector('.dropbtn');
                        if (btn) btn.setAttribute('aria-expanded', 'false');
                    });
                }
            });

            window.addEventListener('resize', function () {
                if (!window.matchMedia('(max-width: 760px)').matches) {
                    dropdowns.forEach((dropdown) => {
                        dropdown.classList.remove('open');
                        const btn = dropdown.querySelector('.dropbtn');
                        if (btn) btn.setAttribute('aria-expanded', 'false');
                    });
                }
            });
        })();
    </script>

</body>
</html>
