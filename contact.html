<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mistress | Mistress Deville</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #d1d1d1;
            --accent-color: #7a0000;
            --glass-bg: rgba(25, 25, 25, 0.85);
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            letter-spacing: 0.01em;
        }

        /* --- Header & Nav --- */
        .site-header {
            display: flex;
            justify-content: center;
            background-color: #ffffff;
            padding: 20px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .header-content {
            width: 90%;
            max-width: 1100px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.5rem;
            color: var(--accent-color);
            text-decoration: none;
        }

        .mail-link {
            text-decoration: none;
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav {
            background: #000;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container { display: flex; justify-content: center; }

        .nav-link {
            color: #888;
            text-decoration: none;
            padding: 18px 20px;
            display: inline-block;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .nav-link:hover { color: #fff; }

        /* --- Main Content Grid --- */
        .main-content {
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .contact-grid {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 4px;
        }

        /* Image Side */
        .contact-visual {
            position: relative;
        }

        .contact-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.05);
            filter: brightness(85%);
        }

        /* Form Side */
        .contact-form-side {
            padding: 0 10px;
        }

        .contact-intro {
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.6rem;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .required-notice {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-family: 'Brush Script MT', cursive;
            color: #a82e2e;
            font-size: 1.4rem;
            margin-bottom: 6px;
        }

        label span { font-family: 'Inter', sans-serif; font-size: 0.9rem; }

        .name-fields { display: flex; gap: 15px; }

        input, textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            border-radius: 2px;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255,255,255,0.05);
        }

        .sub-label {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        textarea { height: 120px; }

        .submit-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 14px 0;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover { background: #900000; }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .contact-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            .contact-visual { height: 300px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <a href="index.html" class="header-logo">Mistress Deville</a>
            <a href="mailto:mistressdeville@example.com" class="mail-link">Private Inquiries</a>
        </div>
    </header>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link">Entry</a>
            <a href="about.html" class="nav-link">Profile</a>
            <a href="sessions.html" class="nav-link">Sessions</a>
            <a href="gifts.html" class="nav-link">Tributes</a>
            <a href="contact.html" class="nav-link" style="color:#fff">Contact</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="contact-grid">
            
            <div class="contact-visual">
                <img src="contact.png" alt="Mistress Deville Contact">
            </div>

            <div class="contact-form-side">
                <div class="contact-intro">
                    You can use the form below to contact me... All information given is confidential.
                </div>

                <p class="required-notice">* Indicates required field</p>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label>Name <span>*</span></label>
                        <div class="name-fields">
                            <div style="flex:1">
                                <input type="text" name="first_name" required>
                                <span class="sub-label">First</span>
                            </div>
                            <div style="flex:1">
                                <input type="text" name="last_name" required>
                                <span class="sub-label">Last</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email <span>*</span></label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number <span>*</span></label>
                        <input type="tel" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label>Your Needs <span>*</span></label>
                        <textarea name="needs" required placeholder="What do you require?"></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Inquiry</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
